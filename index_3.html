function todayStr() { return new Date().toLocaleDateString('ru-RU'); }
function roundNearest15(d) { const t=d.getHours()*60+d.getMinutes(); const r=Math.round(t/15)*15; return pad(Math.floor(r/60)%24)+':'+pad(r%60); }
function pad(n) { return n.toString().padStart(2,'0'); }
function timeToMins(s) { const p=s.split(':'); return parseInt(p[0])*60+parseInt(p[1]); }

function updateClock() {
  const now=new Date();
  document.getElementById('clock').textContent=pad(now.getHours())+':'+pad(now.getMinutes());
  document.getElementById('slot-display').textContent=roundNearest15(now);
  const days=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  document.getElementById('date-line').textContent=days[now.getDay()]+', '+now.getDate()+' '+months[now.getMonth()];
}
setInterval(updateClock,5000); updateClock();

function getLog() { try { return JSON.parse(localStorage.getItem('mstory_log')||'[]').filter(function(e){return e.date===todayStr();}); } catch(e){return[];} }
function getAllLog() { try { return JSON.parse(localStorage.getItem('mstory_log')||'[]'); } catch(e){return[];} }
function saveLog(entry) { try { const a=getAllLog(); a.push(entry); localStorage.setItem('mstory_log',JSON.stringify(a)); } catch(e){} }

function getTodayStatus(name) {
  const log=getLog();
  return {
    hasWork: log.some(function(e){ return e.name===name&&e.type==='work'; }),
    hasFree: log.some(function(e){ return e.name===name&&e.type==='free'; })
  };
}

function renderEmps() {
  const g=document.getElementById('emp-grid'); g.innerHTML='';
  emps.forEach(function(emp){
    const d=document.createElement('div');
    d.className='emp-btn'+(selected===emp.name?' selected':'');
    d.innerHTML='<div class="emp-icon">'+emp.icon+'</div><div class="emp-name">'+emp.name+'</div><div class="emp-role">'+emp.role+'</div>';
    d.onclick=function(){ selected=emp.name; renderEmps(); hideResult(); updateButtons(); };
    g.appendChild(d);
  });
}

    bw.classList.add('disabled'); bf.classList.add('disabled');
    ac.classList.add('show');
    document.getElementById('already-title').textContent='✅ '+selected+', ты уже отметилась сегодня!';
    document.getElementById('already-text').textContent='Приход и уход записаны. До завтра! 🌙';
  } else if(s.hasWork&&!s.hasFree){
    bw.classList.add('disabled'); bf.classList.remove('disabled');
    ac.classList.add('show');
    document.getElementById('already-title').textContent='👍 '+selected+', приход уже записан';
    document.getElementById('already-text').textContent='Нажми «Свобода!» когда будешь уходить.';
  } else {
    bw.classList.remove('disabled'); bf.classList.remove('disabled');
    ac.classList.remove('show');
  }
}

function hideResult() {
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('special-card').classList.remove('show');
  document.getElementById('sending').classList.remove('show');
  document.getElementById('already-card').classList.remove('show');
  document.getElementById('btn-work').classList.remove('disabled');
  document.getElementById('btn-free').classList.remove('disabled');
}

function getSpecial(emp,type,slot) {
  const now=new Date(); const isSat=now.getDay()===6;
  const sm=timeToMins(slot); const s0=timeToMins('08:00'); const e0=timeToMins('17:00');
  if(isSat&&type==='work') return {cls:'saturday',title:'💪 Суббота — а ты уже здесь!',text:'Настоящий профессионал! Катерина это обязательно заметит 😄'};
  if(isSat&&type==='free') return {cls:'saturday',title:'🎉 Суббота отработана!',text:'Дополнительный балл в копилку. Теперь отдыхать! 🌿'};
  if(type==='work'&&sm<s0) return {cls:'early',title:'🌅 Ранняя пташка!',text:'Пришла на '+(s0-sm)+' мин раньше всех! Такой старт — уже победа 😎'};
  if(type==='free'&&sm>e0){
    const late=sm-e0;
    const we=getLog().find(function(e){return e.name===emp.name&&e.type==='work';});
    if(we&&emp.hourly){
      const wm=sm-timeToMins(we.time)-60;
      if(wm>0){
        const hs=Math.floor(wm/60)+'ч'+(wm%60>0?' '+(wm%60)+'мин':'');
        const msgs=[
          'Ну ты сегодня просто огонь! '+hs+' чистого времени — это сила 🔥',
          'День на максимум! '+hs+' — как супергерой 🦸‍♀️',
          'Катерина такое не забывает! '+hs+' — ты сегодня лучшая 💛',
          'Задержалась на '+late+' мин, зато '+hs+' в копилке. Красавица! 🌟'
        ];
        return {cls:'hero',title:'⭐ Ну ты сегодня крутая!',text:msgs[Math.floor(Math.random()*msgs.length)]};
      }
    }
    return {cls:'late',title:'🌙 Засиделась, трудяга!',text:'Ушла на '+late+' мин позже нормы. Заслуженный отдых! 💜'};
  }
  return null;
}

async function markTime(type) {
  if(!selected){alert('Выбери своё имя! 👆');return;}
  if(isSending) return;
  const s=getTodayStatus(selected);
  if(type==='work'&&s.hasWork) return;
  if(type==='free'&&s.hasFree) return;
  isSending=true;
  const emp=emps.find(function(e){return e.name===selected;});
  const slot=roundNearest15(new Date());
  document.getElementById('btn-work').classList.add('disabled');
  document.getElementById('btn-free').classList.add('disabled');
  document.getElementById('sending').classList.add('show');
  const pool=type==='work'?emp.work:emp.free;
  const pick=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('r-emoji').textContent=pick[0];
  document.getElementById('r-name').textContent=selected;
  document.getElementById('r-msg').textContent=pick[1];
  document.getElementById('r-time').innerHTML=(type==='work'?'Начало работы: ':'Конец работы: ')+'<b>'+slot+'</b>';
  document.getElementById('r-sync').textContent='';
  let synced=false;
  try {
    await fetch(SCRIPT_URL+'?'+new URLSearchParams({name:selected,role:emp.role,type:type,time:slot,date:todayStr()}).toString(),{mode:'no-cors'});
    synced=true;
  } catch(e){}
  saveLog({name:selected,role:emp.role,type:type,time:slot,date:todayStr(),synced:synced});
  document.getElementById('sending').classList.remove('show');
  document.getElementById('result-card').classList.add('show');
  const se=document.getElementById('r-sync');
  se.textContent=synced?'✓ Записано в таблицу':'⚠ Нет связи — сохранено локально';
  se.className=synced?'r-sync ok':'r-sync err';
  const sp=getSpecial(emp,type,slot);
  if(sp){
    const sc=document.getElementById('special-card');
    sc.className='special-card show '+sp.cls;
    document.getElementById('special-title').textContent=sp.title;
    document.getElementById('special-text').textContent=sp.text;
  }
  isSending=false;
  updateButtons();
}

function renderLog() {
  const log=getLog(); const el=document.getElementById('log-list');
  if(!log.length){el.innerHTML='<div class="empty">Пока никто не отметился 🌙</div>';return;}
  el.innerHTML='';
  log.slice().reverse().forEach(function(e){
    const d=document.createElement('div'); d.className='log-item';
    const th=e.type==='work'?'<span class="log-type-w">▶ к станку</span>':'<span class="log-type-f">■ свобода</span>';
    const sh=e.synced?'<span class="log-sync-ok">✓ в таблице</span>':'<span class="log-sync-err">⚠ локально</span>';
    d.innerHTML='<div class="log-left"><div class="log-name">'+e.name+'</div>'+th+'<div>'+sh+'</div></div><div class="log-time">'+e.time+'</div>';
    el.appendChild(d);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active',(i===0&&tab==='checkin')||(i===1&&tab==='log'));
  });
  document.getElementById('view-checkin').classList.toggle('active',tab==='checkin');
  document.getElementById('view-log').classList.toggle('active',tab==='log');
  if(tab==='log') renderLog();
}

renderEmps();
</script>
